<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Selenium 2 Playwright</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #10b981;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 2rem;
            text-align: center;
            background: linear-gradient(to bottom, #1e293b, #0f172a);
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(45deg, #818cf8, #34d399);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        main {
            flex: 1;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            padding: 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .editor-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--border);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }

        .editor-container:hover {
            transform: translateY(-5px);
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        label {
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        textarea {
            flex: 1;
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 1rem;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            resize: none;
            outline: none;
            min-height: 500px;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 1px var(--primary);
        }

        .controls {
            grid-column: span 2;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            padding: 1rem;
        }

        select {
            background: var(--card-bg);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-family: inherit;
            font-weight: 600;
            outline: none;
            cursor: pointer;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem 3rem;
            border-radius: 0.5rem;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        button:hover {
            background: var(--primary-hover);
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        .result-info {
            font-size: 0.8rem;
            color: var(--accent);
            margin-top: 0.5rem;
            font-family: 'JetBrains Mono', monospace;
        }

        footer {
            padding: 2rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        @media (max-width: 900px) {
            main {
                grid-template-columns: 1fr;
            }

            .controls {
                grid-column: span 1;
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <header>
        <h1>⚡ Selenium 2 Playwright</h1>
        <p class="subtitle">Transform your legacy Java tests into modern automation magic</p>
    </header>

    <main>
        <div class="editor-container">
            <div class="label-row">
                <label>Input: Selenium Java (TestNG)</label>
            </div>
            <textarea id="javaInput" placeholder="Paste your Selenium Java code here...
Example:
@Test
public void loginTest() {
    driver.get('https://example.com');
    driver.findElement(By.id('user')).sendKeys('admin');
    driver.findElement(By.id('pass')).click();
}"></textarea>
        </div>

        <div class="editor-container">
            <div class="label-row">
                <label>Output: Playwright</label>
                <div id="fileInfo" class="result-info"></div>
            </div>
            <textarea id="pwOutput" readonly placeholder="Converted code will appear here..."></textarea>
        </div>

        <div class="controls">
            <select id="langPref">
                <option value="typescript">TypeScript</option>
                <option value="javascript">JavaScript</option>
            </select>
            <button id="convertBtn">✨ CONVERT NOW</button>
        </div>
    </main>

    <footer>
        B.L.A.S.T. System Pilot &copy; 2026 | Built for Antigravity
    </footer>

    <script>
        const convertBtn = document.getElementById('convertBtn');
        const javaInput = document.getElementById('javaInput');
        const pwOutput = document.getElementById('pwOutput');
        const langPref = document.getElementById('langPref');
        const fileInfo = document.getElementById('fileInfo');

        convertBtn.addEventListener('click', async () => {
            const sourceCode = javaInput.value.trim();
            if (!sourceCode) {
                alert('Please enter some Selenium code first!');
                return;
            }

            convertBtn.innerText = '⚙️ CONVERTING...';
            convertBtn.disabled = true;

            try {
                const response = await fetch('/api/convert', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sourceCode,
                        language: langPref.value
                    })
                });

                const data = await response.json();
                if (data.error) {
                    alert(data.error);
                } else {
                    pwOutput.value = data.convertedCode;
                    fileInfo.innerText = `Saved to: ${data.fileName}`;
                }
            } catch (err) {
                console.error(err);
                alert('Connection to server failed.');
            } finally {
                convertBtn.innerText = '✨ CONVERT NOW';
                convertBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
